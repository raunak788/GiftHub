<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GiftHub Admin Panel</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:30px;
}

.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    background:#e91e63;
    color:#fff;
    border:none;
    padding:12px 20px;
    cursor:pointer;
    border-radius:5px;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}
</style>

</head>
<body>

<div class="container">

<h2>GiftHub Admin Panel</h2>

<input id="name" placeholder="Product Name">

<input id="price" placeholder="Price">

<input id="image" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

<table>

<thead>
<tr>
<th>Name</th>
<th>Price</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="list"></tbody>

</table>

</div>

<script src="js/admin.js"></script>

</body>
</html>
