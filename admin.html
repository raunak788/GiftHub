<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GiftHub Admin Panel</title>

<link rel="stylesheet" href="css/admin.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

<!-- Sidebar -->
<div class="sidebar">

    <div class="logo">
        <h2>🎁 GiftHub</h2>
        <p>Admin Panel</p>
    </div>

    <ul>
        <li class="active">
            <i class="fa-solid fa-chart-line"></i>
            Dashboard
        </li>

        <li>
            <i class="fa-solid fa-box"></i>
            Products
        </li>

        <li>
            <i class="fa-solid fa-cart-shopping"></i>
            Orders
        </li>

        <li>
            <i class="fa-solid fa-users"></i>
            Customers
        </li>

        <li>
            <i class="fa-solid fa-gear"></i>
            Settings
        </li>

    </ul>

</div>

<!-- Main -->

<div class="main">

    <!-- Top Bar -->

    <div class="topbar">

        <h1>Dashboard</h1>

        <button id="logoutBtn">
            Logout
        </button>

    </div>

    <!-- Cards -->

    <div class="cards">

        <div class="card">
            <h3>Total Products</h3>
            <h2 id="productCount">0</h2>
        </div>

        <div class="card">
            <h3>Total Orders</h3>
            <h2>0</h2>
        </div>

        <div class="card">
            <h3>Total Users</h3>
            <h2>0</h2>
        </div>

        <div class="card">
            <h3>Revenue</h3>
            <h2>₹0</h2>
        </div>

    </div>

    <!-- Add Product -->

    <div class="product-box">

        <h2>Add New Product</h2>

        <input
        type="text"
        id="name"
        placeholder="Product Name">

        <input
        type="number"
        id="price"
        placeholder="Price">

        <input
        type="text"
        id="image"
        placeholder="Image URL">

        <select id="category">
            <option>Flowers</option>
            <option>Cakes</option>
            <option>Gifts</option>
            <option>Chocolates</option>
        </select>

        <button onclick="addProduct()">
            Add Product
        </button>

    </div>

    <!-- Product Table -->

    <div class="table-box">

        <h2>Product List</h2>

        <table>

            <thead>

            <tr>

                <th>Image</th>

                <th>Name</th>

                <th>Price</th>

                <th>Category</th>

                <th>Delete</th>

            </tr>

            </thead>

            <tbody id="productTable">

            </tbody>

        </table>

    </div>

</div>

<script src="js/admin.js"></script>

</body>
</html>
