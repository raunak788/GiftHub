<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GiftHub Admin Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
width:380px;
background:#fff;
padding:35px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.login-box h2{
text-align:center;
margin-bottom:25px;
color:#e91e63;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;
}

button{
width:100%;
padding:14px;
background:#e91e63;
color:#fff;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#c2185b;
}

.error{
color:red;
text-align:center;
margin-top:10px;
}
</style>

</head>

<body>

<div class="login-box">

<h2>GiftHub Admin</h2>

<input type="text" id="username" placeholder="Admin Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p class="error" id="msg"></p>

</div>

<script>

function login(){

let user=document.getElementById("username").value;

let pass=document.getElementById("password").value;

if(user==="admin" && pass==="admin123"){

localStorage.setItem("admin","true");

window.location.href="dashboard.html";

}else{

document.getElementById("msg").innerHTML="Invalid Username or Password";

}

}

</script>

</body>
</html>
