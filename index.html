<!DOCTYPE html>
<html>
<head>
  <title>GiftHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">GiftHub</div>
  <button onclick="openCart()" class="cart-btn">Cart 🛒 (<span id="count">0</span>)</button>
</header>

<h2 class="title">Popular Gifts</h2>

<div class="products">

  <div class="product">
    <img src="https://images.unsplash.com/photo-1526045478516-99145907023c">
    <h3>Rose Bouquet</h3>
    <p>₹699</p>
    <button onclick="addToCart('Rose Bouquet',699)">Add</button>
    <a href="product.html">View</a>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1608198093002-ad4e005484ec">
    <h3>Chocolate Cake</h3>
    <p>₹499</p>
    <button onclick="addToCart('Cake',499)">Add</button>
    <a href="product.html">View</a>
  </div>

</div>

<!-- CART -->
<div id="cart" class="cart">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <button onclick="closeCart()">Close</button>
</div>

<script src="script.js"></script>
</body>
</html>
