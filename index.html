<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GiftHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">GiftHub</div>

  <div class="search">
    <input type="text" placeholder="Search flowers, cakes, gifts...">
  </div>

  <nav>
    <a href="#">Home</a>
    <a href="#">Flowers</a>
    <a href="#">Cakes</a>
    <a href="#">Gifts</a>
  </nav>
</header>

<!-- HERO SLIDER -->
<section class="slider">
  <div class="slide active">🎁 Send Love with Gifts</div>
  <div class="slide">🌸 Fresh Flowers Delivered</div>
  <div class="slide">🎂 Cakes for Every Celebration</div>
</section>

<!-- CATEGORIES -->
<section class="categories">
  <h2>Shop by Category</h2>
  <div class="grid">
    <div class="card">🌸 Flowers</div>
    <div class="card">🎂 Cakes</div>
    <div class="card">🎁 Gifts</div>
    <div class="card">🍫 Chocolates</div>
  </div>
</section>

<!-- PRODUCTS -->
<section class="products">
  <h2>Popular Products</h2>

  <div class="product-grid">

    <div class="product">
      <img src="https://images.unsplash.com/photo-1526045478516-99145907023c">
      <h3>Rose Bouquet</h3>
      <p>₹699</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1608198093002-ad4e005484ec">
      <h3>Chocolate Cake</h3>
      <p>₹499</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2">
      <h3>Gift Box</h3>
      <p>₹899</p>
      <button>Add to Cart</button>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 GiftHub | Made with ❤️</p>
</footer>

<script src="script.js"></script>
</body>
</html>
